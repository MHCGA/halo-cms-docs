name: Build Documentation
description: Setup pnpm & Node.js, install dependencies, build docs, and upload artifact

inputs:
  artifact-name:
    description: Name for the uploaded build artifact
    required: false
    default: "docs-dist"

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # https://github.com/pnpm/action-setup/releases/tag/v6.0.3
      name: Install pnpm
      with:
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # https://github.com/actions/setup-node/releases/tag/v6.4.0
      with:
        node-version: 24
        cache: "pnpm"

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Build Documentation
      shell: bash
      run: pnpm docs:build

    - name: Upload build artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # https://github.com/actions/upload-artifact/releases/tag/v7.0.1
      with:
        name: ${{ inputs.artifact-name }}
        path: docs/.vitepress/dist
