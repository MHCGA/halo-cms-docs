name: Build Documentation
description: Setup pnpm & Node.js, install dependencies, build docs, and upload artifact

inputs:
  artifact-name:
    description: Name for the uploaded build artifact
    required: false
    default: "docs-dist"

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # https://github.com/pnpm/action-setup/releases/tag/v5.0.0
      name: Install pnpm
      with:
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # https://github.com/actions/setup-node/releases/tag/v6.3.0
      with:
        node-version: 25
        cache: "pnpm"

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Build Documentation
      shell: bash
      run: pnpm docs:build

    - name: Upload build artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # https://github.com/actions/upload-artifact/releases/tag/v7.0.0
      with:
        name: ${{ inputs.artifact-name }}
        path: docs/.vitepress/dist
