name: Node.js Format and Lint Check

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

# 并发控制：
# - push 到 main 分支：所有推送归入同一组 'format-lint-main'，新推送取消正在进行的旧运行，
#   确保 main 分支的检查和自动格式化始终基于最新代码，避免多个并发运行相互干扰。
# - pull_request：每个 PR 独立成组（组名包含 PR 编号），同一 PR 内新提交时取消旧运行，
#   保证每个 PR 只保留最新的检查结果，节省资源。
# - cancel-in-progress: true 实现上述“新运行取消旧运行”的行为。
concurrency:
  group: |
    ${{
      (github.event_name == 'push') && 'format-lint-main' ||
      (github.event_name == 'pull_request') && format('format-lint-pr-{0}', github.event.pull_request.number) ||
      'format-lint-other'
    }}
  cancel-in-progress: true

jobs:
  check:
    name: Node.js Format and Lint Check
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
          # 使用 PR_WORKFLOW_TOKEN 以确保自动提交不会触发无限循环（需在仓库 secrets 中配置）
          token: ${{ secrets.PR_WORKFLOW_TOKEN || github.token }}

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format
        run: pnpm fmt

      - name: Lint
        run: pnpm lint

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v7
        id: auto-commit-action
        with:
          commit_message: |
            style: auto-format and fixes

      - name: "Run if changes have been detected"
        if: steps.auto-commit-action.outputs.changes_detected == 'true'
        run: echo "Changes!"

      - name: "Run if no changes have been detected"
        if: steps.auto-commit-action.outputs.changes_detected == 'false'
        run: echo "No Changes!"
