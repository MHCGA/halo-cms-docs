name: Node.js Format and Lint Check

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

# 并发控制：
# - push 到 main 分支：所有推送归入同一组 'format-lint-main'，新推送取消正在进行的旧运行，
#   确保 main 分支的检查和自动格式化始终基于最新代码，避免多个并发运行相互干扰。
# - pull_request：每个 PR 独立成组（组名包含 PR 编号），同一 PR 内新提交时取消旧运行，
#   保证每个 PR 只保留最新的检查结果，节省资源。
concurrency:
  group: |
    ${{
      (github.event_name == 'push') && 'format-lint-main' ||
      (github.event_name == 'pull_request') && format('format-lint-pr-{0}', github.event.pull_request.number) ||
      'format-lint-other'
    }}
  cancel-in-progress: true

jobs:
  check:
    name: Node.js Format and Lint Check
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref }}
          # why token is required
          # ref: https://github.com/stefanzweifel/git-auto-commit-action/tree/v7/?tab=readme-ov-file#commits-made-by-this-action-do-not-trigger-new-workflow-runs
          token: ${{ secrets.PR_WORKFLOW_TOKEN || github.token }}

      - uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # https://github.com/pnpm/action-setup/releases/tag/v5.0.0
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # https://github.com/actions/setup-node/releases/tag/v6.3.0
        with:
          node-version: 25
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format
        run: pnpm fmt

      - name: Lint
        run: pnpm lint

      - name: Commit changes
        if: (github.event_name == 'pull_request' && github.actor != 'dependabot[bot]')
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # https://github.com/stefanzweifel/git-auto-commit-action/releases/tag/v7.1.0
        id: auto-commit-action
        with:
          commit_message: |
            style: auto-format and fixes

      - name: "Run if changes have been detected"
        if: steps.auto-commit-action.outputs.changes_detected == 'true'
        run: echo "Changes!"

      - name: "Run if no changes have been detected"
        if: steps.auto-commit-action.outputs.changes_detected == 'false'
        run: echo "No Changes!"
