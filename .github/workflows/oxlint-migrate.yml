name: Oxlint Migration

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # https://github.com/pnpm/action-setup/releases/tag/v6.0.3
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # https://github.com/actions/setup-node/releases/tag/v6.4.0
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run oxlint migration
        run: pnpm run migrate:oxlint

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # https://github.com/peter-evans/create-pull-request/releases/tag/v8.1.1
        with:
          token: ${{ secrets.PR_WORKFLOW_TOKEN }}
          # 使用 PAT 而非 GITHUB_TOKEN，以便创建的 PR 能触发其他工作流
          # 所需权限（Fine-grained PAT）：
          # - Contents: Read and Write（创建分支和提交）
          # - Pull requests: Read and Write（创建 PR）
          # - Workflows: Read and Write（允许 PR 触发工作流）
          commit-message: "chore: update oxlint configuration"
          title: "chore: update oxlint configuration"
          body: |
            This PR updates the oxlint configuration by running the migration tool.

            Generated automatically by the oxlint-migrate workflow.
          branch: chore/oxlint-migrate
          delete-branch: true
          labels: dependencies
          add-paths: |
            .oxlintrc.json
