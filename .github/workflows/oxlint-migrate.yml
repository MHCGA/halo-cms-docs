name: Oxlint Migration

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # https://github.com/actions/checkout/releases/tag/v7.0.1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # https://github.com/pnpm/action-setup/releases/tag/v6.0.9
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # https://github.com/actions/setup-node/releases/tag/v7.0.0
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update oxlint packages
        run: pnpm update -r oxlint@latest oxlint-tsgolint@latest

      - name: Run oxlint migration
        run: pnpm run migrate:oxlint

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # https://github.com/peter-evans/create-pull-request/releases/tag/v8.1.1
        with:
          token: ${{ secrets.PR_WORKFLOW_TOKEN }}
          # 使用 PAT 而非 GITHUB_TOKEN，以便创建的 PR 能触发其他工作流
          # 所需权限（Fine-grained PAT）：
          # - Contents: Read and Write（创建分支和提交）
          # - Pull requests: Read and Write（创建 PR）
          # - Workflows: Read and Write（允许 PR 触发工作流）
          commit-message: "chore: update oxlint configuration"
          title: "chore: update oxlint configuration"
          body: |
            This PR updates the oxlint configuration by running the migration tool.

            Generated automatically by the oxlint-migrate workflow.
          branch: chore/oxlint-migrate
          delete-branch: true
          labels: dependencies
          add-paths: |
            .oxlintrc.json
            package.json
            pnpm-lock.yaml
